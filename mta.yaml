_schema-version: 3.3.0
ID: nexcart
description: A simple CAP project.
version: 1.0.0
modules:
- name: nexcart-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: hdi_db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: db
  type: hdb
  path: db
  requires:
  - name: hdi_db
- name: nexcart-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: nexcart-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - comamistanexcartui.zip
      name: comamistanexcartui
      target-path: resources/
- name: comamistanexcartui
  type: html5
  path: app/nexcartui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: hdi_db
  type: com.sap.xs.hdi-container
  properties:
    hdi-container-name: ${service-name}
- name: nexcart-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: nexcart-html5-service
    service-plan: app-host
- name: nexcart-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: nexcart-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
